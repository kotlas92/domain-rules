name: Build geosite.dat

on:
  push:
    branches: [ master ]
    paths:
      - 'data/**'
      - 'config.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Clone
        run: |
          git clone --depth 1 https://github.com/v2fly/domain-list-community /tmp/dlc
      - name: Build custom
        run: |
          cp data/custom.txt /tmp/dlc/data/custom
          cd /tmp/dlc
          go run ./ --outputdir=/tmp/output --exportLists=custom
          ls -la /tmp/output/
      - name: Prepare release
        run: |
          mkdir -p release
          cp /tmp/output/dlc.dat release/custom.dat
          # sha256 для проверки
          sha256sum release/custom.dat > release/custom.dat.sha256
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            release/custom.dat
            release/custom.dat.sha256
          body: |
            Build ${{ github.run_id }}
            Date: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

